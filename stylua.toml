column_width = 120
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"
# Preserve `if cond then stmt end` one-liners — they're idiomatic in
# Lua and used throughout the codebase (esp. early-return guards).
collapse_simple_statement = "ConditionalOnly"
