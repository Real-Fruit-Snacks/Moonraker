name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install lint tools
        run: |
          luarocks install luacheck

      - name: Run luacheck
        run: luacheck src spec build.lua

      - name: Install stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check src spec build.lua

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    # Unit tests run against the system Lua + luarocks, not the
    # luastatic-built binary. The applets that need lpeg / zlib / bzip2
    # therefore require those bindings installed as system rocks.
    # Linux + macOS provide zlib in the base toolchain; Windows needs
    # extra setup that's not yet wired up — the binary itself works on
    # Windows (verified by the build job's smoke tests), but unit tests
    # are POSIX-only for now.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install zlib + bzip2 dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev libbz2-dev

      - name: Install test deps
        run: |
          luarocks install busted
          luarocks install luafilesystem
          luarocks install lpeg
          luarocks install lua-zlib
          luarocks install luasocket

      - name: Run tests
        env:
          LUA_PATH: "src/?.lua;src/?/init.lua;src/vendor/?.lua;;"
        run: busted --run=ci

  build:
    name: Build (${{ matrix.os }})
    needs: test
    # Linux pinned to ubuntu-22.04 so the artifact has the same glibc
    # baseline (2.35) as the release-workflow build. Building on
    # ubuntu-latest (24.04 / glibc 2.39) would fail to run on older
    # LTS distros.
    # Windows is intentionally excluded: leafo/gh-actions-luarocks@v5
    # tries to run a Unix configure script that doesn't work on
    # Windows runners. A working Windows pipeline would need either a
    # chocolatey-based luarocks install, a different action, or
    # pre-bundled binaries. Tracked as a follow-up.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install build deps
        run: |
          luarocks install luastatic
          luarocks install luafilesystem

      - name: Build
        run: lua build.lua

      - name: Smoke test
        run: |
          ./dist/moonraker --version
          ./dist/moonraker --list
          ./dist/moonraker echo "hello, ${{ matrix.os }}"
          ./dist/moonraker true
          ./dist/moonraker false || test $? -eq 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonraker-${{ matrix.os }}
          path: dist/moonraker*
          if-no-files-found: error
          retention-days: 7
