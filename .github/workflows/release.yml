name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: moonraker
            rename: moonraker-linux-x64
          - os: macos-latest
            target: macos-arm64
            artifact: moonraker
            rename: moonraker-macos-arm64
          - os: windows-latest
            target: windows-x64
            artifact: moonraker.exe
            rename: moonraker-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - uses: leafo/gh-actions-luarocks@v5

      - name: Install build deps
        run: |
          luarocks install luastatic

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        run: lua build.lua

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: lua build.lua

      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/${{ matrix.artifact }}" "dist/${{ matrix.rename }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rename }}
          path: dist/${{ matrix.rename }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Moonraker ${{ steps.tag.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          files: artifacts/*
          fail_on_unmatched_files: true
